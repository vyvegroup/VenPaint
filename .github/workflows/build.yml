name: Build VenPaint APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create gradlew wrapper
      run: |
        if [ ! -f gradlew ]; then
          cat > gradlew << 'GRADLEW'
          #!/bin/sh
          exec gradle "$@"
          GRADLEW
          chmod +x gradlew
        fi

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon

    - name: Build Release APK
      run: gradle assembleRelease --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: VenPaint-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: VenPaint-release
        path: app/build/outputs/apk/release/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Debug APK
      uses: actions/download-artifact@v4
      with:
        name: VenPaint-debug
        path: ./apk-output

    - name: Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: VenPaint-release
        path: ./apk-output

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: VenPaint v1.0.${{ github.run_number }}
        body: |
          ## VenPaint - Android Painting App
          
          A free, full-featured painting app for Android with:
          - 8 brush types (Pencil, Pen, Airbrush, Watercolor, Flat, Round, Crayon, Eraser)
          - Layer system with blend modes
          - Brush QR code generation and scanning
          - .ipv file import (ibisPaint format)
          - Export as PNG, JPG, PSD
          - Undo/Redo
          - No login required, all features free!
          
          **Installation:**
          Download the `VenPaint-debug.apk` file and install on your Android device.
        files: ./apk-output/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
