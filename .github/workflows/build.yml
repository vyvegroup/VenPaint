name: Build VenPaint APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    outputs:
      version: ${{ steps.version.outputs.version }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon

    - name: Set version output
      id: version
      run: echo "version=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

    - name: Upload APK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: VenPaint-apk
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: VenPaint v1.0.${{ github.run_number }}
        body: |
          ## VenPaint - Android Painting App
          
          A free, full-featured painting app for Android with:
          - 8 brush types (Pencil, Pen, Airbrush, Watercolor, Flat, Round, Crayon, Eraser)
          - Layer system with blend modes
          - Brush QR code generation and scanning
          - .ipv file import (ibisPaint format)
          - Export as PNG, JPG, PSD
          - Undo/Redo
          - No login required, all features free!
          
          **Installation:**
          Download the `app-debug.apk` file and install on your Android device.
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
