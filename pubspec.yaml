name: venpaint
description: A professional drawing app with brush QR support
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  path_provider: ^2.1.1
  image: ^4.1.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.5
  flutter_colorpicker: ^1.0.3
  share_plus: ^7.2.1
  file_picker: ^6.1.1
  uuid: ^4.2.1
  archive: ^3.4.10
  png: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
