name: venpaint
description: A professional drawing app with brush QR support
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  path_provider: ^2.1.5
  image: ^4.3.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.0
  flutter_colorpicker: ^1.1.0
  share_plus: ^10.1.4
  file_picker: ^8.1.7
  uuid: ^4.5.1
  archive: ^4.0.4
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
